{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "patchguard.fullname" . }}
  labels:
    {{- include "patchguard.labels" . | nindent 4 }}
    {{- if .Values.serviceMonitor.labels }}
    {{- toYaml .Values.serviceMonitor.labels | nindent 8 }}
    {{- end }}
    {{- if .Values.additionalLabels }}
    {{- toYaml .Values.additionalLabels | nindent 8 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "patchguard.selectorLabels" . | nindent 6 }}
      {{- if .Values.additionalLabels }}
      {{- toYaml .Values.additionalLabels | nindent 8 }}
      {{- end }}
  namespaceSelector:
    matchNames:
      {{- if .Values.serviceMonitor.namespace }}
      - {{ .Values.serviceMonitor.namespace }}
      {{- else }}
      - {{ .Release.Namespace }}
      {{- end }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- if .Values.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml .Values.serviceMonitor.relabelings | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml .Values.serviceMonitor.metricRelabelings | nindent 8 }}
      {{- end }}
{{- end }}